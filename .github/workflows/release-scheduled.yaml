---
name: Scheduled Release

concurrency:
  group: container-release
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      # trunk-ignore(checkov/CKV_GHA_7)
      appsToBuild:
        description: App(s) to build
        required: false
        type: string
        default: all
      force:
        description: Force rebuild
        type: boolean
        default: false
        required: true
  schedule:
    - cron: 15 */6 * * *

jobs:
  simple-checks:
    name: Simple Checks
    uses: ngnodehq/containers/.github/workflows/simple-checks.yaml@7add16be19642dd757264e3e2b4934d130dbbd85 # main

  build-images:
    name: Build Images
    needs: simple-checks
    uses: ngnodehq/containers/.github/workflows/build-images.yaml@7add16be19642dd757264e3e2b4934d130dbbd85 # main
    secrets: inherit
    permissions:
      contents: read
      packages: write
    with:
      appsToBuild: ${{ inputs.appsToBuild }}
      force: ${{ inputs.force == true }}
      pushImages: true
      sendNotifications: true

  render-readme:
    name: Render Readme
    needs: build-images
    uses: ./.github/workflows/render-readme.yaml
    secrets: inherit
