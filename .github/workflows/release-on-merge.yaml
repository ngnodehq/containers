---
name: Release on Merge

concurrency:
  group: container-release
  cancel-in-progress: false

on:
  push:
    branches: [main]
    paths:
      - apps/**
      - .github/scripts/templates/**
      - "!apps/**/metadata.json"
      - "!apps/**/metadata.yaml"
      - "!apps/**/README.md"

jobs:
  simple-checks:
    uses: ngnodehq/containers/.github/workflows/simple-checks.yaml@60a263e1894e00f125de79318d9d11328ed5c43c # main

  get-changed-images:
    needs: [simple-checks]
    uses: ngnodehq/containers/.github/workflows/get-changed-images.yaml@60a263e1894e00f125de79318d9d11328ed5c43c # main

  build-images:
    needs: [simple-checks, get-changed-images]
    if: ${{ needs.get-changed-images.outputs.addedOrModified == 'true' }}
    uses: ngnodehq/containers/.github/workflows/build-images.yaml@60a263e1894e00f125de79318d9d11328ed5c43c # main
    secrets: inherit
    with:
      appsToBuild: "${{ needs.get-changed-images.outputs.addedOrModifiedImages }}"
      pushImages: true
      sendNotifications: true

  render-readme:
    name: Render Readme
    needs: build-images
    if: ${{ always() && needs.build-images.result != 'failure' }}
    uses: ./.github/workflows/render-readme.yaml
    secrets: inherit
